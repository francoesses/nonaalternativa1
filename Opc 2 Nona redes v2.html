document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0;padding:0}\n  body{font-family:'Instrument Sans',sans-serif;background:#A39C86;\n    background-image:repeating-linear-gradient(45deg,#b9b1995e 0 2px,transparent 2px 14px);padding:44px 40px 70px}\n  .head{max-width:1060px;margin:0 auto 30px}\n  .head h1{font-family:'Piazzolla',serif;font-weight:600;font-size:30px;color:#1d1c17;letter-spacing:-.01em}\n  .head p{font-size:15px;color:#46422f;margin-top:8px;max-width:820px;line-height:1.5}\n  .head .warn{display:inline-block;margin-top:13px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;\n    color:#6a6450;border:1px solid #6a645055;border-radius:999px;padding:5px 13px}\n\n  .cols{display:flex;gap:22px;max-width:1060px;margin:0 auto;align-items:stretch}\n  .reg{flex:1;border-radius:14px;overflow:hidden;box-shadow:0 12px 30px rgba(40,30,10,.2)}\n  .reg-head{padding:15px 24px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px}\n  .reg-head .s{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:11px;letter-spacing:.08em;\n    text-transform:uppercase;margin-left:auto}\n  .light .reg-head{background:var(--manteca-deep);color:var(--ink)}\n  .light .reg-head .s{color:var(--ink-3)}\n  .dark .reg-head{background:#161B28;color:var(--slate-fg)}\n  .dark .reg-head .s{color:var(--slate-3)}\n  .light .body{background:var(--manteca)} .dark .body{background:var(--midnight)}\n  .opt{padding:24px 24px;border-top:1px solid #00000012;position:relative}\n  .dark .opt{border-top-color:#ffffff10}\n  .opt .lab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;\n    display:flex;align-items:center;gap:8px;margin-bottom:15px}\n  .light .opt .lab{color:var(--ink-3)} .dark .opt .lab{color:var(--slate-3)}\n  .opt .lab .id{font-weight:600;color:#fff;background:#2A2A2A;border-radius:5px;padding:2px 7px;font-size:9.5px;letter-spacing:.02em}\n  .dark .opt .lab .id{background:#ffffff1f;color:var(--slate-fg)}\n  .demo{display:flex;gap:10px;align-items:center;flex-wrap:wrap}\n  .dot{width:7px;height:7px;border-radius:50%;flex:none}\n\n  /* ─── 4a · Sello (flat solid blocks) ─── */\n  .sello{font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.04em;\n    text-transform:uppercase;padding:7px 12px;border-radius:3px;display:inline-flex;align-items:center;gap:7px}\n  .sello.coral{background:var(--coral);color:#fff}\n  .sello.ink{background:var(--ink);color:var(--manteca)}\n  .sello.mint{background:var(--mint);color:#0e3d27}\n  .dark .sello.coral{background:var(--coral-br);color:#2A0E07}\n  .dark .sello.ink{background:var(--slate-fg);color:var(--midnight)}\n  .dark .sello.mint{background:var(--teal);color:#04241A}\n\n  /* ─── 4b · Editorial (no box) ─── */\n  .edi{display:inline-flex;align-items:center;gap:8px;font-weight:500;font-size:15px}\n  .light .edi{color:var(--ink-2)} .dark .edi{color:var(--slate-2)}\n  .edi-row{display:flex;align-items:center;gap:22px;flex-wrap:wrap}\n  .edi b{font-family:'Piazzolla',serif;font-style:italic;font-weight:600}\n  .light .edi b{color:var(--coral)} .dark .edi b{color:var(--coral-br)}\n\n  /* ─── 4c · Bracket / mono ─── */\n  .brk{font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:7px}\n  .light .brk{color:var(--ink-2)} .dark .brk{color:var(--slate-2)}\n  .brk .b{opacity:.5}\n  .brk.on .d{width:6px;height:6px;border-radius:50%}\n\n  /* ─── 4d · Hairline pill ─── */\n  .hair{font-family:'Instrument Sans',sans-serif;font-weight:500;font-size:13px;padding:6px 13px;border-radius:999px;\n    display:inline-flex;align-items:center;gap:7px;background:transparent}\n  .light .hair{border:1px solid #2a2a2a40;color:var(--ink-2)}\n  .light .hair.on{border-color:var(--mint);color:var(--mint-700);background:#5ec48a14}\n  .dark .hair{border:1px solid #ffffff2e;color:var(--slate-2)}\n  .dark .hair.on{border-color:var(--teal);color:#5fe0ad;background:#00b87c1a}\n\n  .footnote{max-width:1060px;margin:16px auto 0;font-size:13px;color:#46422f;line-height:1.55}\n  .footnote b{color:#1d1c17}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"head\">\n    <h1>nona · tags — cuatro tratamientos<\u002Fh1>\n    <p>Mismo contenido (gratis · sin turno · en línea) en cuatro estilos, en los dos registros. Elegí uno, o combiná (ej: sello para destacar, editorial para lo secundario).<\u002Fp>\n    <span class=\"warn\">Exploración · nada aprobado<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"cols\">\n\n    <!-- ░░ MANTECA ░░ -->\n    <div class=\"reg light\">\n      <div class=\"reg-head\">Registro cálido <span class=\"s\">manteca<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"opt\"><span class=\"lab\">4a · Sello — bloques planos <span class=\"id\">4a<\u002Fspan><\u002Fspan>\n          <div class=\"demo\">\n            <span class=\"sello coral\">gratis<\u002Fspan>\n            <span class=\"sello ink\">sin turno<\u002Fspan>\n            <span class=\"sello mint\"><span class=\"dot\" style=\"background:#0e3d27\"><\u002Fspan>en línea<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"opt\"><span class=\"lab\">4b · Editorial — sin caja <span class=\"id\">4b<\u002Fspan><\u002Fspan>\n          <div class=\"demo edi-row\">\n            <span class=\"edi\"><span class=\"dot\" style=\"background:#E85A35\"><\u002Fspan>gratis<\u002Fspan>\n            <span class=\"edi\"><span class=\"dot\" style=\"background:#2A2A2A\"><\u002Fspan>sin turno<\u002Fspan>\n            <span class=\"edi\"><span class=\"dot\" style=\"background:#5EC48A\"><\u002Fspan><b>en línea<\u002Fb><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"opt\"><span class=\"lab\">4c · Bracket — mono <span class=\"id\">4c<\u002Fspan><\u002Fspan>\n          <div class=\"demo\">\n            <span class=\"brk\"><span class=\"b\">[<\u002Fspan>gratis<span class=\"b\">]<\u002Fspan><\u002Fspan>\n            <span class=\"brk\"><span class=\"b\">[<\u002Fspan>sin turno<span class=\"b\">]<\u002Fspan><\u002Fspan>\n            <span class=\"brk on\"><span class=\"d\" style=\"background:#3C8A67\"><\u002Fspan>en_línea<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"opt\"><span class=\"lab\">4d · Hairline — píldora fina <span class=\"id\">4d<\u002Fspan><\u002Fspan>\n          <div class=\"demo\">\n            <span class=\"hair\">gratis<\u002Fspan>\n            <span class=\"hair\">sin turno<\u002Fspan>\n            <span class=\"hair on\"><span class=\"dot\" style=\"background:#5EC48A\"><\u002Fspan>en línea<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ░░ MIDNIGHT ░░ -->\n    <div class=\"reg dark\">\n      <div class=\"reg-head\">Registro tech <span class=\"s\">midnight<\u002Fspan><\u002Fdiv>\n      <div class=\"body\">\n        <div class=\"opt\"><span class=\"lab\">4a · Sello — bloques planos <span class=\"id\">4a<\u002Fspan><\u002Fspan>\n          <div class=\"demo\">\n            <span class=\"sello coral\">gratis<\u002Fspan>\n            <span class=\"sello ink\">sin turno<\u002Fspan>\n            <span class=\"sello mint\"><span class=\"dot\" style=\"background:#04241A\"><\u002Fspan>en línea<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"opt\"><span class=\"lab\">4b · Editorial — sin caja <span class=\"id\">4b<\u002Fspan><\u002Fspan>\n          <div class=\"demo edi-row\">\n            <span class=\"edi\"><span class=\"dot\" style=\"background:#FF5230\"><\u002Fspan>gratis<\u002Fspan>\n            <span class=\"edi\"><span class=\"dot\" style=\"background:#B7BDCB\"><\u002Fspan>sin turno<\u002Fspan>\n            <span class=\"edi\"><span class=\"dot\" style=\"background:#00B87C\"><\u002Fspan><b>en línea<\u002Fb><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"opt\"><span class=\"lab\">4c · Bracket — mono <span class=\"id\">4c<\u002Fspan><\u002Fspan>\n          <div class=\"demo\">\n            <span class=\"brk\"><span class=\"b\">[<\u002Fspan>gratis<span class=\"b\">]<\u002Fspan><\u002Fspan>\n            <span class=\"brk\"><span class=\"b\">[<\u002Fspan>sin turno<span class=\"b\">]<\u002Fspan><\u002Fspan>\n            <span class=\"brk on\"><span class=\"d\" style=\"background:#00B87C;box-shadow:0 0 6px #00b87c\"><\u002Fspan>en_línea<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"opt\"><span class=\"lab\">4d · Hairline — píldora fina <span class=\"id\">4d<\u002Fspan><\u002Fspan>\n          <div class=\"demo\">\n            <span class=\"hair\">gratis<\u002Fspan>\n            <span class=\"hair\">sin turno<\u002Fspan>\n            <span class=\"hair on\"><span class=\"dot\" style=\"background:#00B87C\"><\u002Fspan>en línea<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <p class=\"footnote\"><b>Mi lectura:<\u002Fb> <b>4a Sello<\u002Fb> es el más propio y “de barrio” (cartel pintado, plano, sin efectos) — pega con la dirección editorial. <b>4b Editorial<\u002Fb> es el más discreto y elegante. <b>4c<\u002Fb> y <b>4d<\u002Fb> tiran más tech/neutro. Se pueden combinar: sello para 1–2 cosas que querés gritar, editorial para el resto.<\u002Fp>\n\n\n<\u002Fbody><\u002Fhtml>"
