<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entre Todos Salud · Carrusel · Precios de la salud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_ds/koa-health-brand-system-d533c564-4873-4d43-9c35-30457ec27f3c/colors_and_type.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #B6AFA0;
  font-family: 'Space Grotesk', sans-serif;
  padding: 48px 44px 80px;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column; align-items: center;
}

/* ── Page chrome ── */
.pg-header { width: 100%; max-width: 1100px; margin-bottom: 36px; }
.pg-eyebrow { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(42,42,42,0.42); margin-bottom: 8px; }
.pg-title   { font-weight: 700; font-size: 22px; letter-spacing: -0.02em; color: #2A2A2A; margin-bottom: 4px; }
.pg-sub     { font-size: 13px; color: rgba(42,42,42,0.48); }

/* ── Viewer ── */
.viewer { display: flex; flex-direction: column; align-items: center; gap: 24px; }
.stage-row { display: flex; align-items: center; gap: 24px; }

.nav-btn {
  width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
  background: #FBF7EC; color: #2A2A2A;
  font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700;
  display: grid; place-items: center; flex-shrink: 0;
  box-shadow: 0 6px 20px rgba(0,0,0,0.16);
  transition: transform .12s cubic-bezier(.2,.8,.2,1), background .12s;
}
.nav-btn:hover  { background: #fff; }
.nav-btn:active { transform: scale(0.94); }

/* slide frame — 4:5 portrait */
.slide-frame {
  width: 540px; height: 675px;
  overflow: hidden; border-radius: 14px;
  box-shadow: 0 18px 60px rgba(0,0,0,0.28), 0 4px 12px rgba(0,0,0,0.12);
  flex-shrink: 0; position: relative;
}
.slide-track { position: absolute; top: 0; left: 0; display: flex; transition: transform .42s cubic-bezier(.2,.8,.2,1); }
.slide-scaler { width: 540px; height: 675px; flex-shrink: 0; overflow: hidden; }
.canvas { transform-origin: top left; transform: scale(.5); width: 1080px; height: 1350px; }

.counter { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(42,42,42,0.45); }

/* thumbnails — 4:5 */
.thumbs { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 1100px; }
.thumb {
  width: 144px; height: 180px; overflow: hidden; border-radius: 8px; cursor: pointer;
  position: relative; flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(0,0,0,0.16);
  transition: transform .12s, box-shadow .12s;
  border: 3px solid transparent;
}
.thumb:hover { transform: translateY(-2px); }
.thumb.active { border-color: #E85A35; box-shadow: 0 6px 18px rgba(232,90,53,0.3); }
.thumb .tcanvas { transform-origin: top left; transform: scale(.13333); width: 1080px; height: 1350px; pointer-events: none; }
.thumb-num {
  position: absolute; top: 6px; left: 7px; z-index: 2;
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
  background: rgba(0,0,0,0.35); color: #fff; padding: 2px 5px; border-radius: 3px; backdrop-filter: blur(4px);
}

/* ══════════════════════════════════════════════════════
   SLIDE CANVAS (1080×1350)  4:5
   ══════════════════════════════════════════════════════ */
.slide {
  width: 1080px; height: 1350px; position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 96px 88px;
}

/* corner marks */
.cm { position: absolute; border-style: solid; width: 32px; height: 32px; }
.cm.tl { top: 64px;    left: 64px;    border-width: 2.5px 0 0 2.5px; }
.cm.tr { top: 64px;    right: 64px;   border-width: 2.5px 2.5px 0 0; }
.cm.bl { bottom: 64px; left: 64px;    border-width: 0 0 2.5px 2.5px; }
.cm.br { bottom: 64px; right: 64px;   border-width: 0 2.5px 2.5px 0; }

/* top row */
.slide-top { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; }
.kicker { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
.kicker .slash { opacity: 0.4; font-weight: 400; }

/* progress */
.progress { display: flex; align-items: center; gap: 9px; }
.pdot { width: 11px; height: 11px; border-radius: 50%; }

/* headline block — vertically centered */
.hl-block { flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 2; }
.hl { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -0.035em; line-height: 1.05; }
.hl-q   { font-size: 100px; }
.hl-big { font-size: 86px; }

/* bottom row */
.slide-bottom { display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 2; }

/* brand signature */
.brand { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 32px; letter-spacing: -0.01em; }
.brand .light { font-weight: 400; opacity: 0.62; }

.helper { font-family: 'Space Grotesk', sans-serif; font-size: 28px; }

/* CTA pill */
.cta-pill {
  display: inline-flex; align-items: center; gap: 16px;
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 38px;
  border-radius: 999px; padding: 28px 56px; position: relative; overflow: hidden; border: none;
}
.cta-pill::before { content: ''; position: absolute; inset: 0; border-radius: 999px; background: linear-gradient(135deg, rgba(255,255,255,.32) 0%, transparent 55%); pointer-events: none; }
.cta-pill .arr { font-family: 'Space Mono', monospace; font-weight: 700; }

/* glow */
.glow { position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 55% at 16% 26%, rgba(0,184,124,.20) 0%, transparent 60%),
              radial-gradient(ellipse 60% 45% at 86% 82%, rgba(255,82,48,.16) 0%, transparent 58%); }
</style>
</head>
<body>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="#F2EBD9"/>
<rect x="30" y="30" width="40" height="40" rx="8" fill="#E85A35"/>
<text x="50" y="58" font-family="monospace" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">ETS</text>
</svg>
</template>

<div class="pg-header">
  <div class="pg-eyebrow">entre todos salud · carrusel · 6 slides · 4:5</div>
  <div class="pg-title">Precios de la salud → solución accesible</div>
  <div class="pg-sub">Flechá o tocá los thumbnails para navegar. Formato 4:5 (1080×1350) — feed de Instagram.</div>
</div>

<div class="viewer">
  <div class="stage-row">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="slide-frame"><div class="slide-track" id="track"></div></div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  <div class="counter" id="counter">01 / 06</div>
  <div class="thumbs" id="thumbs"></div>
</div>

<script>
const C = {
  cream: '#F2EBD9', paper: '#FBF7EC', mid: '#1C2130',
  mint: '#5EC48A', coral: '#E85A35', teal: '#00B87C',
  ink: '#2A2A2A', white: '#fff'
};

function progress(n, light) {
  const onCol  = light ? 'rgba(42,42,42,.85)' : 'rgba(255,255,255,.9)';
  const offCol = light ? 'rgba(42,42,42,.18)' : 'rgba(255,255,255,.25)';
  let dots = '';
  for (let i = 1; i <= 6; i++) {
    const active = i === n;
    dots += `<span class="pdot" style="background:${i===n?onCol:offCol};${active?'width:28px;border-radius:6px;':''}"></span>`;
  }
  return `<div class="progress">${dots}</div>`;
}

function brand(dark) {
  const col = dark ? '#F0EAD8' : C.ink;
  return `<div class="brand" style="color:${col}">Entre Todos <span class="light">Salud</span></div>`;
}

function corner(color) {
  return `<span class="cm tl" style="border-color:${color}"></span><span class="cm tr" style="border-color:${color}"></span><span class="cm bl" style="border-color:${color}"></span><span class="cm br" style="border-color:${color}"></span>`;
}

const slides = [
  // 1
  {
    bg: C.cream,
    html: `
      ${corner(C.coral)}
      <div class="slide-top">
        <div class="kicker" style="color:rgba(42,42,42,.4)">la pregunta<span class="slash">/</span>n1</div>
        ${progress(1,true)}
      </div>
      <div class="hl-block"><div class="hl hl-q" style="color:${C.ink}">¿Los precios te <span style="color:${C.coral}">alejan</span> cada vez más de la salud?</div></div>
      <div class="slide-bottom">
        <div class="helper" style="color:rgba(42,42,42,.42)">Deslizá →</div>
        ${brand(false)}
      </div>`
  },
  // 2 — destacar "obra social" y "medicamentos"
  {
    bg: C.cream,
    html: `
      ${corner(C.coral)}
      <div class="slide-top">
        <div class="kicker" style="color:rgba(42,42,42,.4)">n2<span class="slash">/</span>aumentos</div>
        ${progress(2,true)}
      </div>
      <div class="hl-block"><div class="hl hl-q" style="color:${C.ink}">¿Te subieron la <span style="color:${C.coral}">obra social</span> y los <span style="color:${C.coral}">medicamentos</span>?</div></div>
      <div class="slide-bottom">
        <div class="helper" style="color:rgba(42,42,42,.42)">Deslizá →</div>
        ${brand(false)}
      </div>`
  },
  // 3
  {
    bg: C.cream,
    html: `
      ${corner(C.coral)}
      <div class="slide-top">
        <div class="kicker" style="color:rgba(42,42,42,.4)">n3<span class="slash">/</span>extras</div>
        ${progress(3,true)}
      </div>
      <div class="hl-block"><div class="hl hl-q" style="color:${C.ink}">¿Pagás <span style="-webkit-text-stroke:3px ${C.ink};color:transparent">extras</span> aunque tengas obra social?</div></div>
      <div class="slide-bottom">
        <div class="helper" style="color:rgba(42,42,42,.42)">Deslizá →</div>
        ${brand(false)}
      </div>`
  },
  // 4
  {
    bg: C.cream,
    html: `
      ${corner(C.coral)}
      <div class="slide-top">
        <div class="kicker" style="color:rgba(42,42,42,.4)">n4<span class="slash">/</span>tu tiempo</div>
        ${progress(4,true)}
      </div>
      <div class="hl-block"><div class="hl hl-q" style="color:${C.ink}">¿Cuánto te cuesta <span style="background:linear-gradient(180deg,transparent 38%,rgba(94,196,138,.5) 38%)">perderte</span> el día de trabajo?</div></div>
      <div class="slide-bottom">
        <div class="helper" style="color:rgba(42,42,42,.42)">Deslizá →</div>
        ${brand(false)}
      </div>`
  },
  // 5 — "más cara" coral, "menos" verde
  {
    bg: C.mid, dark: true,
    html: `
      <div class="glow"></div>
      <div class="slide-top">
        <div class="kicker" style="color:rgba(240,234,216,.4)">la realidad<span class="slash">/</span>n5</div>
        ${progress(5,false)}
      </div>
      <div class="hl-block"><div class="hl hl-big" style="color:#F0EAD8">La salud está cada vez <span style="color:${C.coral}">más cara</span> y nos terminamos atendiendo cada vez <span style="color:${C.teal}">menos.</span></div></div>
      <div class="slide-bottom">
        <div class="helper" style="color:rgba(240,234,216,.4)">Deslizá →</div>
        ${brand(true)}
      </div>`
  },
  // 6 — destacar "seguinos" + "dentro de muy poco" más grande
  {
    bg: C.coral, dark: true,
    html: `
      ${corner('rgba(255,255,255,.4)')}
      <div class="slide-top">
        <div class="kicker" style="color:rgba(255,255,255,.55)">muy pronto<span class="slash">/</span>n6</div>
        ${progress(6,false)}
      </div>
      <div class="hl-block">
        <div class="hl" style="color:#fff;font-size:80px;margin-bottom:40px">Si querés una salud más accesible, <span style="display:inline-block;background:#fff;color:${C.coral};border-radius:16px;padding:0 24px 8px;line-height:1.18">seguinos.</span></div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:52px;line-height:1.2;letter-spacing:-0.02em;color:#fff">Dentro de muy poco<br>tenemos algo para vos.</div>
      </div>
      <div class="slide-bottom">
        <button class="cta-pill" style="background:${C.mint};color:#14391F">Seguinos <span class="arr">→</span></button>
        ${brand(true)}
      </div>`
  },
];

const track = document.getElementById('track');
const thumbsEl = document.getElementById('thumbs');
const counter = document.getElementById('counter');
let current = 0;

slides.forEach((s, i) => {
  const scaler = document.createElement('div');
  scaler.className = 'slide-scaler';
  scaler.innerHTML = `<div class="canvas"><div class="slide" style="background:${s.bg}">${s.html}</div></div>`;
  track.appendChild(scaler);

  const t = document.createElement('div');
  t.className = 'thumb' + (i === 0 ? ' active' : '');
  t.dataset.idx = i;
  t.innerHTML = `<span class="thumb-num">${String(i+1).padStart(2,'0')}</span><div class="tcanvas"><div class="slide" style="background:${s.bg}">${s.html}</div></div>`;
  t.addEventListener('click', () => goTo(i));
  thumbsEl.appendChild(t);
});

function goTo(i) {
  current = (i + slides.length) % slides.length;
  track.style.transform = `translateX(-${current * 540}px)`;
  counter.textContent = `${String(current+1).padStart(2,'0')} / 06`;
  [...thumbsEl.children].forEach((t, idx) => t.classList.toggle('active', idx === current));
  localStorage.setItem('ets_carrusel45_slide', current);
}

document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
});

const saved = parseInt(localStorage.getItem('ets_carrusel45_slide') || '0', 10);
goTo(isNaN(saved) ? 0 : saved);
</script>

</body>
</html>
