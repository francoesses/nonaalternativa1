document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Piazzolla';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4edeb93e-6e3c-4a30-9b84-b40f9ec4a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --manteca:#F6E8C8; --manteca-deep:#EFDCAE; --paper:#FCF4E2;\n    --ink:#2A2A2A; --ink-2:#544F3E; --ink-3:#8A7F5E;\n    --mint:#5EC48A; --mint-700:#3C8A67; --coral:#E85A35; --coral-700:#B23A1A;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:'Instrument Sans',sans-serif;padding:46px 40px 70px;\n    background:repeating-linear-gradient(45deg,#b9b1995e 0 2px,transparent 2px 14px),#A39C86;}\n  .head{max-width:1100px;margin:0 auto 36px}\n  .head h1{font-family:'Piazzolla',serif;font-weight:600;font-size:30px;color:#1d1c17;letter-spacing:-.01em}\n  .head p{font-size:15px;color:#46422f;margin-top:8px;max-width:780px;line-height:1.5}\n  .head .warn{display:inline-block;margin-top:14px;font-size:12px;letter-spacing:.06em;\n    text-transform:uppercase;color:#6a6450;border:1px solid #6a645055;border-radius:999px;padding:5px 13px}\n\n  .row{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;align-items:flex-start;max-width:1180px;margin:0 auto}\n  .col{display:flex;flex-direction:column}\n  .badge{font-weight:600;font-size:13px;color:#2A2A2A;background:#F6E8C8;border:1.5px solid #2a2a2a22;\n    border-radius:8px;padding:9px 12px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:10px}\n  .badge .id{font-weight:700;color:#fff;background:#2A2A2A;border-radius:6px;padding:3px 8px;font-size:11px}\n\n  .frame{overflow:hidden;border-radius:4px;box-shadow:0 10px 28px rgba(40,30,10,.22),0 2px 6px rgba(40,30,10,.14)}\n  .f-story{width:340px;height:425px}\n  .f-sq{width:340px;height:340px}\n  .piece{transform-origin:top left;background:var(--manteca);display:flex;flex-direction:column}\n  .p-story{width:1080px;height:1350px;transform:scale(.3148);padding:94px 86px}\n  .p-sq{width:1080px;height:1080px;transform:scale(.3148);padding:88px 86px}\n\n  .eyebrow{font-weight:600;font-size:29px;color:var(--ink-3);letter-spacing:.02em}\n  .rule{width:62px;height:2px;background:var(--coral);margin:30px 0 0}\n  h2{font-family:'Piazzolla',serif;font-weight:600;line-height:1.02;letter-spacing:-.022em;color:var(--ink)}\n  .em{font-style:italic;color:var(--coral);position:relative;white-space:nowrap}\n  .em svg{position:absolute;left:0;right:0;bottom:-16px;width:100%;height:24px;overflow:visible}\n  .sub{font-weight:400;line-height:1.4;color:var(--ink-2)}\n  .foot{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between}\n  .wm{font-family:'Piazzolla',serif;font-weight:700;letter-spacing:-.03em;color:var(--ink)}\n  .wm .dot{color:var(--coral)}\n  .meta{font-weight:500;color:var(--ink-3);text-align:right;line-height:1.45}\n\n  /* Piece 1 headline */\n  .p1 h2{font-size:104px;margin-top:auto}\n  .p1 .sub{font-size:37px;margin-top:42px;max-width:84%}\n  .p1 .wm{font-size:50px}.p1 .meta{font-size:25px}\n\n  /* Piece 2 — cómo funciona (real sequence → numbers justified) */\n  .p2 .eyebrow{margin-bottom:8px}\n  .p2 h2.title{font-size:78px;margin-top:18px;margin-bottom:0}\n  .steps{margin-top:auto;display:flex;flex-direction:column;gap:0}\n  .step{display:flex;gap:34px;align-items:baseline;padding:38px 0;border-top:2px solid #2a2a2a18}\n  .step:last-child{border-bottom:2px solid #2a2a2a18}\n  .step .n{font-family:'Piazzolla',serif;font-style:italic;font-weight:600;font-size:74px;color:var(--coral);line-height:.8;min-width:70px}\n  .step .txt{font-family:'Piazzolla',serif;font-weight:600;font-size:52px;color:var(--ink);letter-spacing:-.015em;line-height:1.06}\n  .step .txt small{display:block;font-family:'Instrument Sans',sans-serif;font-weight:400;font-size:28px;color:var(--ink-2);margin-top:10px;letter-spacing:0}\n  .p2 .foot{margin-top:54px}.p2 .wm{font-size:46px}.p2 .meta{font-size:24px}\n\n  /* Piece 3 — square statement */\n  .p3{justify-content:center}\n  .p3 .eyebrow{margin-bottom:36px}\n  .p3 h2{font-size:118px;line-height:.98}\n  .p3 .big{margin-top:0}\n  .p3 .foot{margin-top:64px}.p3 .wm{font-size:48px}.p3 .meta{font-size:25px}\n\n  .note{font-size:12.5px;color:#46422f;line-height:1.5;margin-top:12px;max-width:340px}\n  .note b{color:#1d1c17}\n  .palette{display:flex;gap:0;margin:0 auto 30px;max-width:560px;border-radius:8px;overflow:hidden;border:1px solid #00000020}\n  .palette .sw{flex:1;height:42px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;font-weight:600;color:#0007}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"head\">\n    <h1>nona · dirección editorial + manteca<\u002Fh1>\n    <p>Tipografía editorial (Piazzolla) sobre fondo <b>Manteca #F6E8C8<\u002Fb>. Acento coral, menta de apoyo, firma a mano. Mismo sistema en tres formatos: titular, “cómo funciona” y placa cuadrada de feed.<\u002Fp>\n    <span class=\"warn\">Exploración · nada aprobado<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"palette\">\n    <div class=\"sw\" style=\"background:#F6E8C8\">manteca #F6E8C8<\u002Fdiv>\n    <div class=\"sw\" style=\"background:#EFDCAE\">deep #EFDCAE<\u002Fdiv>\n    <div class=\"sw\" style=\"background:#2A2A2A;color:#fff9\">grafito<\u002Fdiv>\n    <div class=\"sw\" style=\"background:#E85A35;color:#fff9\">coral<\u002Fdiv>\n    <div class=\"sw\" style=\"background:#5EC48A\">menta<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"row\">\n\n    <!-- 3a · titular -->\n    <div class=\"col\">\n      <div class=\"badge\"><span><b>3a · Titular<\u002Fb> — story<\u002Fspan><span class=\"id\">3a<\u002Fspan><\u002Fdiv>\n      <div class=\"frame f-story\"><div class=\"piece p-story p1\">\n        <span class=\"eyebrow\">Atención de primer nivel<\u002Fspan><div class=\"rule\"><\u002Fdiv>\n        <h2>El médico de <span class=\"em\">cabecera<svg viewBox=\"0 0 300 26\" preserveAspectRatio=\"none\"><path d=\"M4,15 C70,6 130,20 196,11 C240,5 280,16 296,9\" stroke=\"#E85A35\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan> que siempre quisiste.<\u002Fh2>\n        <p class=\"sub\">Escribís lo que te pasa. Te atiende un médico de verdad.<\u002Fp>\n        <div class=\"foot\"><span class=\"wm\">nona<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"meta\">gratis · por WhatsApp<br>sin turno<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Titular.<\u002Fb> La pieza ancla: serif grande, una palabra subrayada a mano. Calidez editorial, nada de cartel médico.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- 3b · cómo funciona -->\n    <div class=\"col\">\n      <div class=\"badge\"><span><b>3b · Cómo funciona<\u002Fb> — story<\u002Fspan><span class=\"id\">3b<\u002Fspan><\u002Fdiv>\n      <div class=\"frame f-story\"><div class=\"piece p-story p2\">\n        <span class=\"eyebrow\">Cómo funciona<\u002Fspan>\n        <h2 class=\"title\">Tres pasos, cero vueltas.<\u002Fh2>\n        <div class=\"steps\">\n          <div class=\"step\"><span class=\"n\">1<\u002Fspan><span class=\"txt\">Escribís<small>Le contás qué te pasa por WhatsApp.<\u002Fsmall><\u002Fspan><\u002Fdiv>\n          <div class=\"step\"><span class=\"n\">2<\u002Fspan><span class=\"txt\">Te escuchamos<small>Ordenamos tu consulta en minutos.<\u002Fsmall><\u002Fspan><\u002Fdiv>\n          <div class=\"step\"><span class=\"n\">3<\u002Fspan><span class=\"txt\">Te atiende un médico<small>De verdad. Sin apuro.<\u002Fsmall><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"foot\"><span class=\"wm\">nona<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"meta\">gratis · 24 hs<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Cómo funciona.<\u002Fb> Acá los números <b>sí<\u002Fb> tienen sentido: es una secuencia real. Numerales en Piazzolla italic coral, no badges.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- 3c · placa cuadrada -->\n    <div class=\"col\">\n      <div class=\"badge\"><span><b>3c · Placa feed<\u002Fb> — cuadrada<\u002Fspan><span class=\"id\">3c<\u002Fspan><\u002Fdiv>\n      <div class=\"frame f-sq\"><div class=\"piece p-sq p3\">\n        <span class=\"eyebrow\">Sin obra social, sin problema<\u002Fspan>\n        <h2 class=\"big\">Hay alguien del <span class=\"em\">otro lado<svg viewBox=\"0 0 300 26\" preserveAspectRatio=\"none\"><path d=\"M4,15 C70,7 130,19 196,11 C240,6 280,16 296,9\" stroke=\"#E85A35\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>.<\u002Fh2>\n        <div class=\"foot\"><span class=\"wm\">nona<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"meta\">gratis · por WhatsApp<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Placa de feed.<\u002Fb> Formato cuadrado, mismo lenguaje. Frase corta y humana — la voz de la doctora cercana.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
