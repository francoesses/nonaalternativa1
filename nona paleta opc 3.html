document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 display:flex;align-items:center;gap:14px}\n  .kicker .sl{font-weight:400}\n  .disp{font-family:var(--disp);font-weight:700;letter-spacing:-.03em;line-height:1.0}\n  .bodytxt{font-family:var(--body);font-weight:400;line-height:1.42}\n  .wm{font-family:var(--disp);font-weight:700;letter-spacing:-.03em}\n  /* emphasis devices */\n  .fr{font-family:var(--serif);font-style:italic;font-weight:800;font-size:1.08em;line-height:.9}\n  .hl{position:relative;padding:0 .04em}\n  .out{-webkit-text-stroke:2px var(--manteca);color:transparent}\n  .out-ink{-webkit-text-stroke:2px var(--marron);color:transparent}\n  .blk{padding:0 .12em;border-radius:7px}\n  /* badges n1/n2/n3 */\n  .badge{width:74px;height:74px;border-radius:17px;display:grid;place-items:center;\n    font-family:var(--disp);font-weight:700;font-size:30px}\n  /* corner-marks */\n  .cm{position:absolute;width:34px;height:34px}\n  /* sello tag */\n  .sello{font-family:var(--disp);font-weight:600;font-size:23px;letter-spacing:.01em;padding:11px 19px;border-radius:999px;\n    display:inline-flex;align-items:center;gap:9px}\n  .dot{width:9px;height:9px;border-radius:50%}\n  .pagedots{display:flex;gap:9px} .pagedots i{width:13px;height:13px;border-radius:50%;display:block}\n\n  .note{font-size:12.5px;color:#3a2c12;line-height:1.5;margin-top:11px;max-width:300px}\n  .note b{color:#2a1f0e}\n  .palette{display:flex;max-width:820px;margin:22px auto 0;border-radius:9px;overflow:hidden;border:1px solid #00000022}\n  .palette .sw{flex:1;height:50px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;\n    font-family:var(--mono);font-size:9px;font-weight:400}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"head\">\n    <h1>nona · paleta Otoño × tipografía y reglas del handoff<\u002Fh1>\n    <p>La paleta cálida nueva, pero esta vez con el <b>sistema tipográfico oficial<\u002Fb>: Space Grotesk en titulares, DM Sans en cuerpo, <b>Fraunces italic 800<\u002Fb> para énfasis en fondos claros, <b>outline<\u002Fb> en fondos oscuros, <b>bloque<\u002Fb> de color, badges <code>n1/n2/n3<\u002Fcode> y kicker mono con <code>/<\u002Fcode>. Carrusel, combinaciones de fondo, historia con elemento extra y flyer.<\u002Fp>\n    <span class=\"warn\">Exploración · el sistema oficial sigue intacto<\u002Fspan>\n    <div class=\"palette\">\n      <div class=\"sw\" style=\"background:#CF7F04;color:#F5E3A8\">naranja<\u002Fdiv>\n      <div class=\"sw\" style=\"background:#C6972F;color:#3A2A14\">dorado<\u002Fdiv>\n      <div class=\"sw\" style=\"background:#C78380;color:#3A2A14\">rosa<\u002Fdiv>\n      <div class=\"sw\" style=\"background:#543B20;color:#F5E3A8\">marrón<\u002Fdiv>\n      <div class=\"sw\" style=\"background:#72784C;color:#F5E3A8\">oliva<\u002Fdiv>\n      <div class=\"sw\" style=\"background:#F5E3A8;color:#3A2A14\">manteca<\u002Fdiv>\n      <div class=\"sw\" style=\"background:#FBF3DD;color:#3A2A14\">crema<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rules\">\n    <b>Reglas de énfasis aplicadas (del handoff):<\u002Fb> fondo claro (crema/manteca/dorado) → <b>Fraunces italic 800<\u002Fb> o <b>highlighter<\u002Fb>; fondo oscuro (marrón/oliva) → <b>outline<\u002Fb> 2px o <b>bloque<\u002Fb>, nunca italic serif. El highlighter mint del sistema se adapta acá a un acento cálido de la paleta (dorado/rosa). Una palabra por pieza, siempre pesando más que el resto.\n  <\u002Fdiv>\n\n  <!-- ════════════ CARRUSEL ════════════ -->\n  <div class=\"section-label\">Carrusel <span class=\"n\">4 placas · cada una otro fondo + otro recurso de énfasis<\u002Fspan><\u002Fdiv>\n  <div class=\"row\">\n\n    <!-- S1 · naranja + Fraunces -->\n    <div class=\"col\">\n      <div class=\"cap\"><span>1 · portada — naranja + Fraunces<\u002Fspan><span class=\"id\">6a<\u002Fspan><\u002Fdiv>\n      <div class=\"frame sq\"><div class=\"piece p-sq\" style=\"background:var(--naranja);padding:88px 80px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div class=\"kicker\" style=\"color:var(--manteca)\">N1<span class=\"sl\" style=\"color:var(--marron)\">/<\u002Fspan>GRATIS<\u002Fdiv>\n          <span class=\"pagedots\"><i style=\"background:var(--manteca)\"><\u002Fi><i style=\"background:#ffffff40\"><\u002Fi><i style=\"background:#ffffff40\"><\u002Fi><i style=\"background:#ffffff40\"><\u002Fi><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:108px;color:var(--manteca);margin-top:auto\">El médico de <span class=\"fr\" style=\"color:#fff\">cabecera<\u002Fspan> que siempre quisiste.<\u002Fdiv>\n        <div class=\"wm\" style=\"font-size:50px;color:var(--manteca);margin-top:64px\">nona<span style=\"color:var(--marron)\">.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Fraunces italic 800<\u002Fb> en fondo naranja (claro-medio): el énfasis pesa más, cálido.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- S2 · crema + highlighter -->\n    <div class=\"col\">\n      <div class=\"cap\"><span>2 · cómo — crema + highlighter<\u002Fspan><span class=\"id\">6b<\u002Fspan><\u002Fdiv>\n      <div class=\"frame sq\"><div class=\"piece p-sq\" style=\"background:var(--crema);padding:88px 80px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div class=\"kicker\" style=\"color:var(--oliva)\">CÓMO<span class=\"sl\" style=\"color:var(--naranja)\">/<\u002Fspan>FUNCIONA<\u002Fdiv>\n          <span class=\"pagedots\"><i style=\"background:#0000002e\"><\u002Fi><i style=\"background:var(--naranja)\"><\u002Fi><i style=\"background:#0000002e\"><\u002Fi><i style=\"background:#0000002e\"><\u002Fi><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:92px;color:var(--marron);margin-top:auto\">Escribís y te atiende un médico <span class=\"hl disp\" style=\"font-size:1em;background:linear-gradient(180deg,transparent 42%,var(--dorado) 42%);color:var(--marron)\">de verdad<\u002Fspan>.<\u002Fdiv>\n        <div class=\"bodytxt\" style=\"font-size:36px;color:#6a5230;margin-top:40px;max-width:84%\">Sin turno, sin vueltas, sin obra social.<\u002Fdiv>\n        <div class=\"wm\" style=\"font-size:46px;color:var(--marron);margin-top:auto\">nona<span style=\"color:var(--naranja)\">.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Highlighter<\u002Fb> en dorado (reemplaza al mint en esta paleta). Fondo crema cálido.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- S3 · oliva + outline -->\n    <div class=\"col\">\n      <div class=\"cap\"><span>3 · pasos — oliva + outline<\u002Fspan><span class=\"id\">6c<\u002Fspan><\u002Fdiv>\n      <div class=\"frame sq\"><div class=\"piece p-sq\" style=\"background:var(--oliva);padding:88px 80px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div class=\"kicker\" style=\"color:var(--manteca)\">TRES<span class=\"sl\" style=\"color:var(--naranja)\">/<\u002Fspan>PASOS<\u002Fdiv>\n          <span class=\"pagedots\"><i style=\"background:#ffffff40\"><\u002Fi><i style=\"background:#ffffff40\"><\u002Fi><i style=\"background:var(--manteca)\"><\u002Fi><i style=\"background:#ffffff40\"><\u002Fi><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:88px;color:#fff;margin-top:54px\">Cero <span class=\"out disp\" style=\"font-size:1em;-webkit-text-stroke:2px var(--manteca)\">vueltas<\u002Fspan>.<\u002Fdiv>\n        <div style=\"margin-top:auto;display:flex;flex-direction:column;gap:22px\">\n          <div style=\"display:flex;align-items:center;gap:24px\"><span class=\"badge\" style=\"background:var(--manteca);color:var(--marron)\">n1<\u002Fspan><span class=\"disp\" style=\"font-size:40px;color:#fff\">Escribís<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:24px\"><span class=\"badge\" style=\"background:#ffffff1f;color:var(--manteca);border:1.5px solid #ffffff44\">n2<\u002Fspan><span class=\"disp\" style=\"font-size:40px;color:#fff\">Te escuchamos<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:24px\"><span class=\"badge\" style=\"background:var(--naranja);color:#fff\">n3<\u002Fspan><span class=\"disp\" style=\"font-size:40px;color:#fff\">Te atiende un médico<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wm\" style=\"font-size:44px;color:var(--manteca);margin-top:56px\">nona<span style=\"color:var(--naranja)\">.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Outline<\u002Fb> 2px en fondo oscuro (oliva) + badges <code>n1/n2/n3<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- S4 · marrón + bloque -->\n    <div class=\"col\">\n      <div class=\"cap\"><span>4 · cierre — marrón + bloque<\u002Fspan><span class=\"id\">6d<\u002Fspan><\u002Fdiv>\n      <div class=\"frame sq\"><div class=\"piece p-sq\" style=\"background:var(--marron);padding:88px 80px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div class=\"kicker\" style=\"color:var(--rosa)\">ESCRIBINOS<span class=\"sl\" style=\"color:var(--naranja)\">/<\u002Fspan>24H<\u002Fdiv>\n          <span class=\"pagedots\"><i style=\"background:#ffffff40\"><\u002Fi><i style=\"background:#ffffff40\"><\u002Fi><i style=\"background:#ffffff40\"><\u002Fi><i style=\"background:var(--manteca)\"><\u002Fi><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:98px;color:var(--manteca);margin-top:auto\">Hay <span class=\"blk disp\" style=\"font-size:1em;background:var(--naranja);color:var(--marron)\">alguien<\u002Fspan> del otro lado.<\u002Fdiv>\n        <div style=\"display:flex;gap:14px;margin-top:48px\">\n          <span class=\"sello\" style=\"background:var(--naranja);color:var(--marron)\"><span class=\"dot\" style=\"background:var(--marron)\"><\u002Fspan>en línea<\u002Fspan>\n          <span class=\"sello\" style=\"background:transparent;color:var(--manteca);border:1.5px solid #ffffff55\">gratis<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"wm\" style=\"font-size:44px;color:var(--manteca);margin-top:54px\">nona<span style=\"color:var(--naranja)\">.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Bloque<\u002Fb> naranja en fondo oscuro (marrón) + sellos.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════════════ COMBINACIONES DE FONDO ════════════ -->\n  <div class=\"section-label\">Combinaciones de fondo <span class=\"n\">mismo titular · qué fondo + qué énfasis funciona<\u002Fspan><\u002Fdiv>\n  <div class=\"row\">\n    <div class=\"col\"><div class=\"cap\"><span>manteca + naranja<\u002Fspan><span class=\"id\">7a<\u002Fspan><\u002Fdiv>\n      <div class=\"frame sq\"><div class=\"piece p-sq\" style=\"background:var(--manteca);padding:84px 76px;justify-content:center\">\n        <div class=\"disp\" style=\"font-size:100px;color:var(--marron)\">Tu médico, <span class=\"fr\" style=\"color:var(--naranja)\">a mano<\u002Fspan>.<\u002Fdiv>\n        <div class=\"wm\" style=\"font-size:42px;color:var(--marron);margin-top:54px\">nona<span style=\"color:var(--naranja)\">.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n\n    <div class=\"col\"><div class=\"cap\"><span>rosa + marrón<\u002Fspan><span class=\"id\">7b<\u002Fspan><\u002Fdiv>\n      <div class=\"frame sq\"><div class=\"piece p-sq\" style=\"background:var(--rosa);padding:84px 76px;justify-content:center\">\n        <div class=\"disp\" style=\"font-size:100px;color:var(--marron)\">Tu médico, <span class=\"fr\" style=\"color:#fff\">a mano<\u002Fspan>.<\u002Fdiv>\n        <div class=\"wm\" style=\"font-size:42px;color:var(--marron);margin-top:54px\">nona<span style=\"color:#fff\">.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n\n    <div class=\"col\"><div class=\"cap\"><span>dorado + outline marrón<\u002Fspan><span class=\"id\">7c<\u002Fspan><\u002Fdiv>\n      <div class=\"frame sq\"><div class=\"piece p-sq\" style=\"background:var(--dorado);padding:84px 76px;justify-content:center\">\n        <div class=\"disp\" style=\"font-size:100px;color:var(--marron)\">Tu médico, <span class=\"out-ink disp\" style=\"font-size:1em\">a mano<\u002Fspan>.<\u002Fdiv>\n        <div class=\"wm\" style=\"font-size:42px;color:var(--marron);margin-top:54px\">nona<span style=\"color:#fff\">.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n\n    <div class=\"col\"><div class=\"cap\"><span>marrón + bloque naranja<\u002Fspan><span class=\"id\">7d<\u002Fspan><\u002Fdiv>\n      <div class=\"frame sq\"><div class=\"piece p-sq\" style=\"background:var(--marron);padding:84px 76px;justify-content:center\">\n        <div class=\"disp\" style=\"font-size:100px;color:var(--manteca)\">Tu médico, <span class=\"blk disp\" style=\"font-size:1em;background:var(--naranja);color:var(--marron)\">a mano<\u002Fspan>.<\u002Fdiv>\n        <div class=\"wm\" style=\"font-size:42px;color:var(--manteca);margin-top:54px\">nona<span style=\"color:var(--naranja)\">.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════════════ HISTORIA con elemento extra ════════════ -->\n  <div class=\"section-label\">Historia <span class=\"n\">9:16 · con elemento extra (mock de chat)<\u002Fspan><\u002Fdiv>\n  <div class=\"row\">\n\n    <div class=\"col\">\n      <div class=\"cap\"><span>Historia · chat mock<\u002Fspan><span class=\"id\">8a<\u002Fspan><\u002Fdiv>\n      <div class=\"frame st\"><div class=\"piece p-st\" style=\"background:var(--naranja);padding:120px 80px\">\n        <div class=\"kicker\" style=\"color:var(--manteca)\">POR<span class=\"sl\" style=\"color:var(--marron)\">/<\u002Fspan>WHATSAPP<\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:118px;color:var(--manteca);margin-top:46px\">Le escribís como a un <span class=\"fr\" style=\"color:#fff\">amigo<\u002Fspan>.<\u002Fdiv>\n        <!-- elemento extra: tarjeta de chat -->\n        <div style=\"background:var(--crema);border-radius:34px;padding:44px 40px;margin-top:70px;box-shadow:0 24px 50px rgba(40,28,8,.3)\">\n          <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px\">\n            <div style=\"width:60px;height:60px;border-radius:16px;background:var(--marron);display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:30px;color:var(--manteca)\">n<\u002Fdiv>\n            <div><div class=\"disp\" style=\"font-size:34px;color:var(--marron)\">nona<\u002Fdiv><\u002Fdiv>\n            <span class=\"sello\" style=\"margin-left:auto;background:var(--oliva);color:var(--manteca);font-size:19px;padding:8px 14px\"><span class=\"dot\" style=\"background:var(--manteca)\"><\u002Fspan>en línea<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:var(--manteca-2);border-radius:8px 26px 26px 26px;padding:26px 30px;font-family:var(--body);font-size:34px;color:var(--marron);max-width:88%;line-height:1.32\">Hola, contame qué te pasa y vemos cómo darte una mano 👋<\u002Fdiv>\n          <div style=\"background:var(--marron);color:var(--manteca);border-radius:26px 26px 8px 26px;padding:26px 30px;font-family:var(--body);font-size:34px;max-width:80%;margin:20px 0 0 auto;line-height:1.32\">Me duele la garganta hace 2 días<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between\">\n          <span class=\"wm\" style=\"font-size:58px;color:var(--manteca)\">nona<span style=\"color:var(--marron)\">.<\u002Fspan><\u002Fspan>\n          <span class=\"bodytxt\" style=\"font-weight:500;font-size:30px;color:var(--manteca);text-align:right;opacity:.92\">gratis · sin turno<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Elemento extra:<\u002Fb> mock de conversación WhatsApp como tarjeta cálida (crema sobre naranja). Muestra el producto sin captura real.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- historia variante con dato grande -->\n    <div class=\"col\">\n      <div class=\"cap\"><span>Historia · dato + outline<\u002Fspan><span class=\"id\">8b<\u002Fspan><\u002Fdiv>\n      <div class=\"frame st\"><div class=\"piece p-st\" style=\"background:var(--marron);padding:120px 80px\">\n        <div class=\"kicker\" style=\"color:var(--rosa)\">SIEMPRE<span class=\"sl\" style=\"color:var(--naranja)\">/<\u002Fspan>ABIERTO<\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:230px;color:var(--manteca);margin-top:40px;line-height:.86\">24<span style=\"color:var(--naranja)\">h<\u002Fspan><\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:96px;color:var(--manteca);margin-top:20px\">Siempre hay <span class=\"out disp\" style=\"font-size:1em\">alguien<\u002Fspan>.<\u002Fdiv>\n        <div class=\"bodytxt\" style=\"font-size:38px;color:var(--manteca);opacity:.9;margin-top:46px;max-width:88%\">No es un bot que te deja colgado. Te atiende un médico de verdad.<\u002Fdiv>\n        <div style=\"margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between\">\n          <span class=\"wm\" style=\"font-size:58px;color:var(--manteca)\">nona<span style=\"color:var(--naranja)\">.<\u002Fspan><\u002Fspan>\n          <span class=\"bodytxt\" style=\"font-weight:500;font-size:30px;color:var(--rosa);text-align:right\">por WhatsApp<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Dato grande<\u002Fb> (24h) como recurso visual + outline en fondo oscuro. Misma familia, otro ritmo.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════════════ FLYER ════════════ -->\n  <div class=\"section-label\">Flyer <span class=\"n\">afiche informativo · corner-marks + badges<\u002Fspan><\u002Fdiv>\n  <div class=\"row\">\n    <div class=\"col\">\n      <div class=\"cap\"><span>Flyer · dorado<\u002Fspan><span class=\"id\">9a<\u002Fspan><\u002Fdiv>\n      <div class=\"frame fl\"><div class=\"piece p-fl\" style=\"background:var(--dorado);padding:80px 76px;align-items:center;text-align:center\">\n        <span class=\"cm\" style=\"top:40px;left:40px;border-top:3px solid var(--marron);border-left:3px solid var(--marron)\"><\u002Fspan>\n        <span class=\"cm\" style=\"top:40px;right:40px;border-top:3px solid var(--marron);border-right:3px solid var(--marron)\"><\u002Fspan>\n        <span class=\"cm\" style=\"bottom:40px;left:40px;border-bottom:3px solid var(--marron);border-left:3px solid var(--marron)\"><\u002Fspan>\n        <span class=\"cm\" style=\"bottom:40px;right:40px;border-bottom:3px solid var(--marron);border-right:3px solid var(--marron)\"><\u002Fspan>\n        <div class=\"kicker\" style=\"color:var(--marron);justify-content:center\">ATENCIÓN<span class=\"sl\" style=\"color:var(--naranja)\">/<\u002Fspan>GRATIS<\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:122px;color:var(--marron);margin-top:34px;line-height:.96\">Un médico,<br><span class=\"fr\" style=\"color:var(--naranja)\">a mano<\u002Fspan>.<\u002Fdiv>\n        <div class=\"bodytxt\" style=\"font-size:38px;color:var(--marron);margin-top:48px;max-width:86%\">Escribís por WhatsApp, te escuchamos y te derivamos a un médico de verdad. Sin costo, sin turno.<\u002Fdiv>\n        <div style=\"display:flex;gap:46px;margin-top:60px\">\n          <div><div class=\"disp\" style=\"font-size:78px;color:var(--naranja)\">2′<\u002Fdiv><div class=\"bodytxt\" style=\"font-weight:500;font-size:26px;color:var(--marron);margin-top:4px\">en responder<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:2px;background:#543b2033\"><\u002Fdiv>\n          <div><div class=\"disp\" style=\"font-size:78px;color:var(--naranja)\">24h<\u002Fdiv><div class=\"bodytxt\" style=\"font-weight:500;font-size:26px;color:var(--marron);margin-top:4px\">los 365 días<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:30px\">\n          <div class=\"disp\" style=\"font-weight:600;background:var(--marron);color:var(--manteca);font-size:44px;padding:22px 50px;border-radius:999px;display:inline-flex;align-items:center;gap:16px\">Escribinos <span style=\"font-family:var(--mono);font-weight:700\">→<\u002Fspan><\u002Fdiv>\n          <span class=\"wm\" style=\"font-size:52px;color:var(--marron)\">nona<span style=\"color:var(--naranja)\">.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <p class=\"note\"><b>Flyer.<\u002Fb> Corner-marks marrón, Space Grotesk + Fraunces, datos de apoyo y CTA pill. Imprimible o para feed.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- flyer variante oliva -->\n    <div class=\"col\">\n      <div class=\"cap\"><span>Flyer · oliva<\u002Fspan><span class=\"id\">9b<\u002Fspan><\u002Fdiv>\n      <div class=\"frame fl\"><div class=\"piece p-fl\" style=\"background:var(--oliva);padding:80px 76px;align-items:center;text-align:center\">\n        <span class=\"cm\" style=\"top:40px;left:40px;border-top:3px solid var(--manteca);border-left:3px solid var(--manteca)\"><\u002Fspan>\n        <span class=\"cm\" style=\"top:40px;right:40px;border-top:3px solid var(--manteca);border-right:3px solid var(--manteca)\"><\u002Fspan>\n        <span class=\"cm\" style=\"bottom:40px;left:40px;border-bottom:3px solid var(--manteca);border-left:3px solid var(--manteca)\"><\u002Fspan>\n        <span class=\"cm\" style=\"bottom:40px;right:40px;border-bottom:3px solid var(--manteca);border-right:3px solid var(--manteca)\"><\u002Fspan>\n        <div class=\"kicker\" style=\"color:var(--manteca);justify-content:center\">SIN<span class=\"sl\" style=\"color:var(--naranja)\">/<\u002Fspan>OBRA SOCIAL<\u002Fdiv>\n        <div class=\"disp\" style=\"font-size:118px;color:#fff;margin-top:34px;line-height:.96\">Igual te <span class=\"out disp\" style=\"font-size:1em\">atendemos<\u002Fspan>.<\u002Fdiv>\n        <div class=\"bodytxt\" style=\"font-size:38px;color:var(--manteca);margin-top:48px;max-width:86%\">No hace falta tener cobertura. Escribinos y un médico te atiende, gratis.<\u0
